<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CerviDetect{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        .navbar-brand {
            font-weight: 700;
        }
        /* Custom styling for the upload/detection container */
        .upload-card {
            border: 2px dashed #0d6efd;
            background-color: #fff;
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        .upload-card:hover {
            background-color: #f1f7ff;
            border-color: #0a58ca;
        }
        /* Extra custom styles can go here */
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Shared Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand text-info" href="/"><i class="fa-solid fa-microscope me-2"></i>CerviDetect</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fa-solid fa-house me-1"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about"><i class="fa-solid fa-circle-info me-1"></i> About & Detection</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact"><i class="fa-solid fa-envelope me-1"></i> Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dynamic Content Zone -->
    <main class="container my-5">
        {% block content %}
        <!-- Child templates will automatically inject their code here -->
        {% endblock %}
    </main>

    <!-- Shared Footer -->
    <footer class="text-center py-4 bg-dark text-white-50 mt-auto">
        <div class="container">
            <p class="mb-0 small">&copy; 2026 CerviDetect Project. Developed for healthcare analysis and research.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
